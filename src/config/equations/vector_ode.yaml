rabi_oscillations:
  category: Quantum
  name: Rabi Oscillations
  formula: Two-level system under driving
  description: 'Rabi oscillations: two-level atom driven by resonant/near-resonant
    field.

    y = [Re(c_g), Im(c_g), Re(c_e), Im(c_e)] for ground and excited amplitudes.

    '
  vector_components: 4
  order: 1
  parameters:
    Omega:
      default: 1.0
      description: Rabi frequency
      display: Ω
    delta:
      default: 0.0
      description: Detuning
      display: Δ
    omega_drive:
      default: 1.0
      description: Drive frequency
  function_name: rabi_oscillations
  default_initial_conditions:
  - 1.0
  - 0.0
  - 0.0
  - 0.0
  default_domain:
  - 0.0
  - 20.0
schrodinger_equation:
  category: Quantum
  name: Time-Dependent Schrödinger Equation
  formula: iℏ ∂ψ/∂t = Ĥ(t)ψ
  description: 'iℏ ∂ψ/∂t = Ĥ(t)ψ

    Time-dependent Schrödinger equation with Hamiltonian H(t) and potential V(t).

    f₀ = Re(ψ), f₁ = Im(ψ). Parameters a, b tune the default H and V.

    '
  vector_components: 2
  order: 1
  parameters:
    a:
      default: 1.0
      description: Hamiltonian scale
    b:
      default: 0.5
      description: Potential scale
  function_name: schrodinger_equation
  default_initial_conditions:
  - 1.0
  - 0.0
  default_domain:
  - 0.0
  - 20.0
lorentz_system:
  category: Chaos
  name: Lorenz System
  formula: f₀' = σ(f₁-f₀), f₁' = f₀(ρ-f₂)-f₁, f₂' = f₀f₁-βf₂
  description: 'f₀'' = σ(f₁-f₀), f₁'' = f₀(ρ-f₂)-f₁, f₂'' = f₀f₁-βf₂

    Classic chaotic attractor (Lorenz 1963).

    '
  vector_components: 3
  order: 1
  parameters:
    sigma:
      default: 10.0
      description: Prandtl number
      display: σ
    rho:
      default: 28.0
      description: Rayleigh number
      display: ρ
    beta:
      default: 2.667
      description: Geometry factor
      display: β
  function_name: lorentz_system
  default_initial_conditions:
  - 1.0
  - 1.0
  - 1.0
  default_domain:
  - 0.0
  - 25.0
lotka_volterra:
  category: Population
  name: Lotka-Volterra (Predator-Prey)
  formula: f₀' = αf₀ - βf₀f₁, f₁' = δf₀f₁ - γf₁
  description: 'f₀'' = αf₀ - βf₀f₁, f₁'' = δf₀f₁ - γf₁

    Classic predator-prey population dynamics.

    '
  vector_components: 2
  order: 1
  parameters:
    alpha:
      default: 1.0
      description: Prey growth rate
      display: α
    beta:
      default: 0.1
      description: Predation rate
      display: β
    gamma:
      default: 1.5
      description: Predator death rate
      display: γ
    delta:
      default: 0.075
      description: Predator growth from prey
      display: δ
  function_name: lotka_volterra
  default_initial_conditions:
  - 10.0
  - 5.0
  default_domain:
  - 0.0
  - 50.0
rigid_body_euler:
  category: Physics
  name: Rigid Body (Euler Equations)
  formula: ω₀' = (I₂-I₃)/I₁·ω₁ω₂, ω₁' = (I₃-I₁)/I₂·ω₂ω₀, ω₂' = (I₁-I₂)/I₃·ω₀ω₁
  description: 'Euler equations for torque-free rigid body rotation.

    I₁, I₂, I₃ are principal moments of inertia (diagonal of inertia tensor).

    f₀=ω₁, f₁=ω₂, f₂=ω₃ are angular velocities about principal axes.

    '
  vector_components: 3
  order: 1
  parameters:
    I1:
      default: 1.0
      description: Moment of inertia 1
    I2:
      default: 2.0
      description: Moment of inertia 2
    I3:
      default: 3.0
      description: Moment of inertia 3
  function_name: rigid_body_euler
  default_initial_conditions:
  - 1.0
  - 0.0
  - 0.5
  default_domain:
  - 0.0
  - 20.0
bloch_equations:
  category: Physics
  name: Bloch Equations
  formula: Mₓ' = γ(M×B)ₓ - Mₓ/T₂, Mᵧ' = γ(M×B)ᵧ - Mᵧ/T₂, M_z' = γ(M×B)_z - (M_z-1)/T₁
  description: 'Bloch equations for magnetization dynamics in a magnetic field.

    f₀=Mₓ, f₁=Mᵧ, f₂=Mz. Relaxation: T₁ (longitudinal), T₂ (transverse).

    Equilibrium magnetization M₀=1 along z.

    '
  vector_components: 3
  order: 1
  parameters:
    gamma:
      default: 1.0
      description: Gyromagnetic ratio
      display: γ
    Bx:
      default: 0.1
      description: B-field x
    By:
      default: 0.0
      description: B-field y
    Bz:
      default: 1.0
      description: B-field z
    T1:
      default: 2.0
      description: Longitudinal relaxation time
    T2:
      default: 1.0
      description: Transverse relaxation time
  function_name: bloch_equations
  default_initial_conditions:
  - 1.0
  - 0.0
  - 0.0
  default_domain:
  - 0.0
  - 10.0
rossler_attractor:
  category: Chaos
  name: Rössler Attractor
  formula: f₀' = -f₁-f₂, f₁' = f₀+af₁, f₂' = b+f₂(f₀-c)
  description: 'Rössler attractor: classic chaotic system.

    Simpler than Lorenz, single scroll.

    '
  vector_components: 3
  order: 1
  parameters:
    a:
      default: 0.2
      description: Parameter a
    b:
      default: 0.2
      description: Parameter b
    c:
      default: 5.7
      description: Parameter c
  function_name: rossler_attractor
  default_initial_conditions:
  - 1.0
  - 1.0
  - 1.0
  default_domain:
  - 0.0
  - 100.0
sir_epidemic:
  category: Population
  name: SIR Epidemic Model
  formula: S' = -βSI, I' = βSI - γI, R' = γI
  description: 'SIR model: Susceptible, Infected, Recovered.

    β = transmission rate, γ = recovery rate.

    '
  vector_components: 3
  order: 1
  parameters:
    beta:
      default: 0.5
      description: Transmission rate
      display: β
    gamma:
      default: 0.2
      description: Recovery rate
      display: γ
  function_name: sir_epidemic
  default_initial_conditions:
  - 0.99
  - 0.01
  - 0.0
  default_domain:
  - 0.0
  - 50.0
fitzhugh_nagumo:
  category: Physics
  name: FitzHugh-Nagumo (Neuron)
  formula: v' = v - v³/3 - w + I, w' = (v + a - bw)/a
  description: 'Simplified Hodgkin-Huxley model for neuron dynamics.

    v = membrane potential, w = recovery variable.

    '
  vector_components: 2
  order: 1
  parameters:
    a:
      default: 0.7
      description: Parameter a
    b:
      default: 0.8
      description: Parameter b
    I_ext:
      default: 0.0
      description: External current
