coupled_harmonic_oscillators:
  category: Oscillators
  name: Coupled Harmonic Oscillators
  formula: f[0,2] = -ω²f[0,0] + k(f[1,0]-f[0,0]), f[1,2] = -ω²f[1,0] + k(f[0,0]-f[1,0])
  description: 'Two masses connected by springs. f[0,0], f[1,0] are positions.

    f[i,k] = component i, derivative order k.

    '
  order: 2
  vector_expressions:
  - -ω**2 * f[0,0] + k * (f[1,0] - f[0,0])
  - -ω**2 * f[1,0] + k * (f[0,0] - f[1,0])
  vector_components: 2
  parameters:
    ω:
