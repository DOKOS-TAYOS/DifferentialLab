  formula: f[0,2] = -2ω²f[0,0] + ω²f[1,0], f[1,2] = 2ω²f[0,0] - 2ω²f[1,0]
  description: 'Linearized double pendulum. f[0,0], f[1,0] are small angles.

    f[i,k] = component i, derivative order k.

