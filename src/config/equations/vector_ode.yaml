  - 0.0
  default_domain:
  - 0.0
  - 50.0
chen_system:
  category: Chaos
  name: Chen System
  formula: f₀' = a(f₁-f₀), f₁' = (c-a)f₀ - f₀f₂ + cf₁, f₂' = f₀f₁ - bf₂
  description: 'Chen attractor: chaotic system dual to Lorenz.

