poisson_2d:
  category: Poisson
  name: Poisson Equation (2D)
  formula: -∇²f = g(x,y)
  description: '-fₓₓ - fᵧᵧ = g(x,y)

    Elliptic PDE. Solves for f(x,y) with zero Dirichlet boundary conditions.

    Use expression for the RHS g(x,y). Example: k for constant, or x*y.

    '
  variables:
  - x
  - y
  order: 1
  parameters:
    k:
      default: 1.0
      description: Constant RHS (if expression is 'k')
  expression: k
  default_initial_conditions: []
  default_domain:
  - 0.0
  - 1.0
  - 0.0
  - 1.0
laplace_2d:
  category: Laplace
  name: Laplace Equation (2D)
  formula: ∇²f = 0
  description: 'fₓₓ + fᵧᵧ = 0

    Harmonic function. Zero Dirichlet BC.

    '
  variables:
  - x
  - y
  order: 1
  parameters: {}
  expression: '0'
  default_initial_conditions: []
  default_domain:
  - 0.0
  - 1.0
  - 0.0
  - 1.0
poisson_xy:
  category: Poisson
  name: 'Poisson: -∇²f = x·y'
  formula: -∇²f = x·y
  description: '-fₓₓ - fᵧᵧ = x·y

    Poisson equation with bilinear source term.

    '
  variables:
  - x
  - y
  order: 1
  parameters: {}
  expression: x * y
  default_initial_conditions: []
  default_domain:
  - 0.0
  - 1.0
  - 0.0
  - 1.0
poisson_sin:
  category: Poisson
  name: 'Poisson: -∇²f = sin(πx)sin(πy)'
  formula: -∇²f = sin(πx)sin(πy)
  description: '-fₓₓ - fᵧᵧ = sin(πx)sin(πy)

    Classic test case with known analytical solution f = sin(πx)sin(πy)/(2π²).

    '
  variables:
  - x
  - y
  order: 1
  parameters: {}
  expression: sin(pi*x) * sin(pi*y)
  default_initial_conditions: []
  default_domain:
  - 0.0
  - 1.0
  - 0.0
  - 1.0
poisson_linear:
  category: Poisson
  name: 'Poisson: -∇²f = x + y'
  formula: -∇²f = x + y
  description: '-fₓₓ - fᵧᵧ = x + y

    Poisson with linear source term.

    '
  variables:
  - x
  - y
  order: 1
  parameters: {}
  expression: x + y
  default_initial_conditions: []
  default_domain:
  - 0.0
  - 1.0
  - 0.0
  - 1.0
poisson_quadratic:
  category: Poisson
  name: 'Poisson: -∇²f = x² + y²'
  formula: -∇²f = x² + y²
  description: '-fₓₓ - fᵧᵧ = x² + y²

    Poisson with quadratic source term.

    '
  variables:
  - x
  - y
  order: 1
  parameters: {}
  expression: x**2 + y**2
  default_initial_conditions: []
  default_domain:
  - 0.0
  - 1.0
  - 0.0
  - 1.0
poisson_gaussian:
  category: Poisson
  name: 'Poisson: -∇²f = exp(-(x²+y²)/σ²)'
  formula: -∇²f = exp(-(x²+y²)/σ²)
  description: '-fₓₓ - fᵧᵧ = exp(-(x²+y²)/σ²)

    Poisson with Gaussian source. Parameter σ controls the width.

    '
  variables:
  - x
  - y
  order: 1
  parameters:
    sigma:
      default: 0.3
      description: Gaussian width
      display: σ
  expression: exp(-(x**2 + y**2) / sigma**2)
  default_initial_conditions: []
  default_domain:
  - -1.0
  - 1.0
  - -1.0
  - 1.0
poisson_cos:
  category: Poisson
  name: 'Poisson: -∇²f = cos(πx)cos(πy)'
  formula: -∇²f = cos(πx)cos(πy)
  description: '-fₓₓ - fᵧᵧ = cos(πx)cos(πy)

    Poisson with cosine source term.

    '
  variables:
  - x
  - y
  order: 1
  parameters: {}
  expression: cos(pi*x) * cos(pi*y)
  default_initial_conditions: []
  default_domain:
  - 0.0
  - 1.0
  - 0.0
  - 1.0
poisson_exp_sin:
  category: Poisson
  name: 'Poisson: -∇²f = exp(-x)sin(y)'
  formula: -∇²f = exp(-x)sin(y)
  description: '-fₓₓ - fᵧᵧ = exp(-x)sin(y)

    Poisson with exponential-decay and sinusoidal source.

    '
  variables:
  - x
  - y
  order: 1
  parameters: {}
  expression: exp(-x) * sin(y)
  default_initial_conditions: []
  default_domain:
  - 0.0
  - 2.0
  - 0.0
  - 3.14159
poisson_rational:
  category: Poisson
  name: 'Poisson: -∇²f = 1/(1+x²+y²)'
  formula: -∇²f = 1/(1+x²+y²)
  description: '-fₓₓ - fᵧᵧ = 1/(1+x²+y²)

    Poisson with rational (Lorentzian-type) source.

    '
  variables:
  - x
  - y
  order: 1
  parameters: {}
  expression: 1 / (1 + x**2 + y**2)
  default_initial_conditions: []
  default_domain:
  - -1.0
  - 1.0
  - -1.0
  - 1.0
poisson_cos2pi:
  category: Poisson
  name: 'Poisson: -∇²f = cos(2πx)'
  formula: -∇²f = cos(2πx)
  description: '-fₓₓ - fᵧᵧ = cos(2πx)

    Poisson with x-only periodic source.

    '
  variables:
  - x
  - y
  order: 1
  parameters: {}
  expression: cos(2*pi*x)
  default_initial_conditions: []
  default_domain:
  - 0.0
  - 1.0
  - 0.0
  - 1.0
poisson_xy2:
  category: Poisson
  name: 'Poisson: -∇²f = x²y + xy²'
  formula: -∇²f = x²y + xy²
  description: '-fₓₓ - fᵧᵧ = x²y + xy²

    Poisson with cubic mixed source term.

    '
  variables:
  - x
  - y
  order: 1
  parameters: {}
  expression: x**2*y + x*y**2
  default_initial_conditions: []
  default_domain:
  - 0.0
  - 1.0
  - 0.0
  - 1.0
