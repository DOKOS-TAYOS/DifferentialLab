harmonic_oscillator:
  category: Oscillators
  name: Simple Harmonic Oscillator
  formula: f'' + ω²f = 0
  description: "f'' + ω²f = 0

    Models a mass on a spring with no friction."
  order: 2
  parameters:
    ω:
      default: 1.0
      description: Angular frequency (rad/s)
  expression: -ω**2 * f[0]
  default_initial_conditions:
  - 1.0
  - 0.0
  default_domain:
  - 0.0
  - 20.0
damped_oscillator:
  category: Oscillators
  name: Damped Oscillator
  formula: f'' + 2γf' + ω²f = 0
  description: "f'' + 2γf' + ω²f = 0

    Mass-spring-damper system."
  order: 2
  parameters:
    ω:
      default: 1.0
      description: Natural angular frequency (rad/s)
    γ:
      default: 0.1
      description: Damping coefficient
  expression: -2*γ*f[1] - ω**2*f[0]
  default_initial_conditions:
  - 1.0
  - 0.0
  default_domain:
  - 0.0
  - 40.0
exponential_growth:
  category: Population
  name: Exponential Growth / Decay
  formula: f' = kf
  description: "f' = kf

    Growth (k>0) or decay (k<0)."
  order: 1
  parameters:
    k:
      default: 0.5
      description: Growth rate constant
  expression: k * f[0]
  default_initial_conditions:
  - 1.0
  default_domain:
  - 0.0
  - 10.0
logistic_equation:
  category: Population
  name: Logistic Equation
  formula: f' = rf(1 - f/K)
  description: "f' = rf(1 - f/K)

    Population growth with carrying capacity."
  order: 1
  parameters:
    r:
      default: 1.0
      description: Growth rate
    K:
      default: 10.0
      description: Carrying capacity
  expression: r * f[0] * (1 - f[0] / K)
  default_initial_conditions:
  - 0.5
  default_domain:
  - 0.0
  - 15.0
van_der_pol:
  category: Oscillators
  name: Van der Pol Oscillator
  formula: f'' - μ(1 - f²)f' + f = 0
  description: "f'' - μ(1 - f²)f' + f = 0

    Nonlinear oscillator with self-sustained oscillations."
  order: 2
  parameters:
    μ:
      default: 1.0
      description: Nonlinearity parameter
  expression: μ * (1 - f[0]**2) * f[1] - f[0]
  default_initial_conditions:
  - 2.0
  - 0.0
  default_domain:
  - 0.0
  - 30.0
simple_pendulum:
  category: Oscillators
  name: Simple Pendulum
  formula: f'' + (g/L)sin(f) = 0
  description: "f'' + (g/L)sin(f) = 0

    Nonlinear pendulum with gravity."
  order: 2
  parameters:
    g:
      default: -9.81
      description: Gravitational acceleration (m/s²)
    L:
      default: 1.0
      description: Pendulum length (m)
  expression: -(g / L) * sin(f[0])
  default_initial_conditions:
  - 0.5
  - 0.0
  default_domain:
  - 0.0
  - 15.0
rc_circuit:
  category: Physics
  name: RC Circuit (Discharge)
  formula: f' = -f/(RC)
  description: "f' = -f/(RC)

    Capacitor voltage during discharge."
  order: 1
  parameters:
    R:
      default: 1000.0
      description: Resistance (Ω)
    C:
      default: 0.001
      description: Capacitance (F)
  expression: -f[0] / (R * C)
  default_initial_conditions:
  - 5.0
  default_domain:
  - 0.0
  - 5.0
free_fall_drag:
  category: Physics
  name: Free Fall with Drag
  formula: f'' = g - (b/m)f'
  description: "f'' = g - (b/m)f'

    Falling object with linear air resistance."
  order: 2
  parameters:
    g:
      default: -9.81
      description: Gravitational acceleration (m/s²)
    b:
      default: 0.5
      description: Drag coefficient (kg/s)
    m:
      default: 1.0
      description: Mass (kg)
  expression: g - (b / m) * f[1]
  default_initial_conditions:
  - 0.0
  - 0.0
  default_domain:
  - 0.0
  - 10.0
rlc_circuit:
  category: Physics
  name: RLC Circuit (Series)
  formula: f'' + (R/L)f' + (1/LC)f = 0
  description: "f'' + (R/L)f' + (1/LC)f = 0

    Series RLC circuit with zero forcing."
  order: 2
  parameters:
    R:
      default: 1.0
      description: Resistance (Ω)
    L:
      default: 1.0
      description: Inductance (H)
    C:
      default: 1.0
      description: Capacitance (F)
  function_name: rlc_circuit
  default_initial_conditions:
  - 1.0
  - 0.0
  default_domain:
  - 0.0
  - 20.0
gompertz_growth:
  category: Population
  name: Gompertz Growth
  formula: f' = rf·ln(K/f)
  description: "f' = rf·ln(K/f)

    Tumor and cell population growth model."
  order: 1
  parameters:
    r:
      default: 0.5
      description: Growth rate
    K:
      default: 10.0
      description: Carrying capacity
  function_name: gompertz_growth
  default_initial_conditions:
  - 1.0
  default_domain:
  - 0.0
  - 15.0
newton_cooling:
  category: Physics
  name: Newton's Law of Cooling
  formula: f' = -k(f - T_env)
  description: "f' = -k(f - T_env)

    Temperature decay toward ambient."
  order: 1
  parameters:
    k:
      default: 0.1
      description: Cooling coefficient
    T_env:
      default: 20.0
      description: Ambient temperature
  function_name: newton_cooling
  default_initial_conditions:
  - 100.0
  default_domain:
  - 0.0
  - 50.0
linear_decay_source:
  category: Physics
  name: Linear Decay with Source
  formula: f' = a - bf
  description: "f' = a - bf

    Constant inflow with linear decay (e.g. drug concentration)."
  order: 1
  parameters:
    a:
      default: 1.0
      description: Source rate
    b:
      default: 0.5
      description: Decay rate
  function_name: linear_decay_source
  default_initial_conditions:
  - 0.0
  default_domain:
  - 0.0
  - 10.0
airy_equation:
  category: Quantum
  name: Airy Equation
  formula: f'' = x·f
  description: "f'' = x·f

    Quantum mechanics, optics, and diffraction."
  order: 2
  parameters: {}
  function_name: airy_equation
  default_initial_conditions:
  - 0.355028
  - -0.258819
  default_domain:
  - 0.0
  - 5.0
hermite_ode:
  category: Quantum
  name: Hermite Equation
  formula: f'' - 2xf' + 2nf = 0
  description: "f'' - 2xf' + 2nf = 0

    Hermite polynomials; eigenfunctions of quantum harmonic oscillator."
  order: 2
  parameters:
    n:
      default: 2.0
      description: Quantum number / eigenvalue
  function_name: hermite_ode
  default_initial_conditions:
  - 1.0
  - 0.0
  default_domain:
  - -2.0
  - 2.0
laguerre_ode:
  category: Quantum
  name: Laguerre Equation
  formula: xf'' + (1-x)f' + nf = 0
  description: "xf'' + (1-x)f' + nf = 0

    Laguerre polynomials; hydrogen atom radial wave functions."
  order: 2
  parameters:
    n:
      default: 1.0
      description: Parameter (integer for Laguerre polynomials)
  function_name: laguerre_ode
  default_initial_conditions:
  - 1.0
  - 0.0
  default_domain:
  - 0.01
  - 10.0
bessel_ode:
  category: Quantum
  name: Bessel Equation
  formula: f'' + f'/x + (1 - n²/x²)f = 0
  description: "f'' + f'/x + (1 - n²/x²)f = 0

    Radial equation in QM; spherical Bessel, hydrogen."
  order: 2
  parameters:
    n:
      default: 0.0
      description: Order (integer for Bessel J_n)
  function_name: bessel_ode
  default_initial_conditions:
  - 1.0
  - 0.0
  default_domain:
  - 0.1
  - 10.0
stationary_schrodinger_ho:
  category: Quantum
  name: Stationary Schrödinger (Harmonic Well)
  formula: f'' + (E - x²)f = 0
  description: "f'' + (E - x²)f = 0

    1D Schrödinger in V(x)=x²/2; ℏ=m=ω=1. f = ψ(x)."
  order: 2
  parameters:
    E:
      default: 1.5
      description: Energy eigenvalue
  function_name: stationary_schrodinger_ho
  default_initial_conditions:
  - 1.0
  - 0.0
  default_domain:
  - -3.0
  - 3.0
stationary_schrodinger_well:
  category: Quantum
  name: Stationary Schrödinger (Square Well)
  formula: f'' + (E - V(x))f = 0
  description: "f'' + (E - V(x))f = 0

    Finite square well: V=V₀ for |x|>a, 0 inside."
  order: 2
  parameters:
    E:
      default: 2.0
      description: Energy
    V0:
      default: 10.0
      description: Well depth
    a:
      default: 1.0
      description: Half-width
  function_name: stationary_schrodinger_well
  default_initial_conditions:
  - 1.0
  - 0.0
  default_domain:
  - -2.0
  - 2.0
kummer_ode:
  category: Quantum
  name: Kummer Equation
  formula: xf'' + (b-x)f' - af = 0
  description: "xf'' + (b-x)f' - af = 0

